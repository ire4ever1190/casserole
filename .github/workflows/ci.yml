on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        nim: ["2.2.4", "stable", "devel"]

    name: Test Nim ${{ matrix.nim}}
    steps:
      - uses: iffy/install-nim@v5
        with:
          version: ${{ matrix.nim }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: "Run Tests"
        run: nimble test

  deploy:
    needs: test
    if: github.ref == 'refs/heads/main'
    permissions:
      pages: write # To deploy to Pages
      id-token: write # Verify deployment
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: iffy/install-nim@v5
        with:
          version: choosenim:devel
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: "Run Tests"
        run: nimble test

      - name: "Build documentation"
        uses: ire4ever1190/nim-docs-action@v2
        with:
          main-file: "src/casserole.nim"
          deploy: "pages"
          versions: "stable HEAD"
